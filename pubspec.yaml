name: sangwari_maa
description: "Your Maternal Health Companion"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # ── Navigation ────────────────────────────────────────────────────────
  go_router: ^17.2.3

  # ── Network ───────────────────────────────────────────────────────────
  dio: ^5.4.3
  retrofit: ^4.1.0

  # ── Local DB ──────────────────────────────────────────────────────────
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # ── Firebase ─────────────────────────────────────────────────────────
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  firebase_crashlytics: ^4.3.5
  firebase_analytics: ^11.4.5


  # ── Fonts & UI ────────────────────────────────────────────────────────

  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  skeletonizer: ^2.1.3

  # ── Storage & Auth ────────────────────────────────────────────────────
  flutter_secure_storage: ^10.2.0
  shared_preferences: ^2.2.3

  # ── Utils ─────────────────────────────────────────────────────────────
  intl: ^0.20.2
  connectivity_plus: ^7.1.1
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  package_info_plus: ^9.0.1
  geolocator: ^14.0.2
  workmanager: ^0.9.0+3
  local_auth: ^3.0.1
  fl_chart: ^1.2.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.0

  # ── Architecture ──────────────────────────────────────────────────────
  dartz: ^0.10.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  get_it: ^9.2.1
  injectable: ^2.4.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.0
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.3
  build_runner: ^2.4.9
  retrofit_generator: ^10.2.1
  drift_dev: ^2.18.0
  json_serializable: ^6.8.0
  freezed: ^3.1.0
  injectable_generator: ^2.6.2
  mocktail: ^1.0.3


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true

  # The following line ensures that the Material icons font is
  # included with your application, so that you can use the icons in
  # the material icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Italic-VariableFont_wdth,wght.ttf
        - asset: assets/fonts/Roboto-VariableFont_wdth,wght.ttf




flutter_native_splash:
  color: "#FFFFFF"              # background color (use your brand color)
  image: assets/images/app_logo.png
  color_dark: "#1A1A2E"         # optional dark mode background
  image_dark: assets/images/app_logo.png
  android_12:
    image: assets/images/app_logo.png
    color: "#FFFFFF"
  fullscreen: false


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"   # or your brand color
  adaptive_icon_foreground: "assets/images/app_logo.png"
  web:
    generate: false
